apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: networking
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: >-
    Networking / VPN gateway apps (openconnect-gateway, wg-vless-gateway,
    wstunnel). Deployed via the networking app-of-apps.
  sourceRepos:
    - https://github.com/Arbuzov/home-k8s-argo.git
    - git@github.com:Arbuzov/home-k8s-helm.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: vpn
    - server: https://kubernetes.default.svc
      namespace: wstunnel
    - server: https://kubernetes.default.svc
      namespace: mcp
    - server: https://kubernetes.default.svc
      namespace: argo-cd
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
