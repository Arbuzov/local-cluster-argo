replicaCount: 1

image:
  repository: docker.io/aw1cks/openconnect
  tag: "latest"
  pullPolicy: IfNotPresent

vpn:
  url: "https://vpn.corp.example"
  authGroup: "VPN_GROUP_A"
  extraArgs: "--servercert pin-sha256:REDACTED"
  secretName: "mcp-atlassian-vpn-credentials"
  usernameKey: "USERNAME"
  passwordKey: "PASSWORD"

routedCidrs:
  - 10.20.0.0/24

nodeSelector:
  vpn-gateway-capable: "true"

tolerations: []
affinity: {}

resources:
  limits:
    cpu: 300m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

service:
  port: 443
