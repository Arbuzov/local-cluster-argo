apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openconnect-gateway.fullname" . }}
  labels:
    {{- include "openconnect-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openconnect-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openconnect-gateway.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: init-forwarding
          image: {{ include "openconnect-gateway.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              ln -sf /sbin/xtables-nft-multi /sbin/iptables
              echo 1 > /proc/sys/net/ipv4/ip_forward
              echo 0 > /proc/sys/net/ipv4/conf/all/rp_filter
              echo 0 > /proc/sys/net/ipv4/conf/default/rp_filter
              iptables -P FORWARD ACCEPT
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
      containers:
        - name: openconnect
          image: {{ include "openconnect-gateway.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              ln -sf /sbin/xtables-nft-multi /sbin/iptables
              exec /vpn/entrypoint.sh
          env:
            - name: URL
              value: {{ .Values.vpn.url | quote }}
            - name: AUTH_GROUP
              value: {{ .Values.vpn.authGroup | quote }}
            - name: EXTRA_ARGS
              value: {{ .Values.vpn.extraArgs | quote }}
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vpn.secretName }}
                  key: {{ .Values.vpn.usernameKey }}
            - name: PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vpn.secretName }}
                  key: {{ .Values.vpn.passwordKey }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ip addr show tun127 | grep -q "inet "
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
