apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vikunja
  namespace: argo-cd
  finalizers:  # cascade-delete this app's resources when removed from the app-of-apps; see apps/README.md
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  source:
    repoURL: ghcr.io/go-vikunja/helm-chart
    chart: vikunja
    targetRevision: v2.0.2
    helm:
      values: |-
        vikunja:
          image:
            repository: vikunja/vikunja
            tag: "latest"

          podSecurityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            runAsNonRoot: true
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true

          persistence:
            database:
              enabled: true
              accessMode: ReadWriteOnce
              size: 2Gi
              mountPath: /db
              storageClass: smb
            data:
              enabled: true
              accessMode: ReadWriteOnce
              size: 2Gi
              mountPath: /app/vikunja/files
              storageClass: smb

          env:
            VIKUNJA_DATABASE_TYPE: "sqlite"
            VIKUNJA_DATABASE_PATH: "/db/vikunja.db"
            # Google OIDC clientid/clientsecret injected from Secret `vikunja-oidc`
            # (namespace vikunja), created out-of-band — see README.md. The
            # provider `google:` key must stay in config.yml below for these env
            # overrides to bind onto the providers map.
            VIKUNJA_AUTH_OPENID_PROVIDERS_GOOGLE_CLIENTID:
              valueFrom:
                secretKeyRef:
                  name: vikunja-oidc
                  key: google-clientid
            VIKUNJA_AUTH_OPENID_PROVIDERS_GOOGLE_CLIENTSECRET:
              valueFrom:
                secretKeyRef:
                  name: vikunja-oidc
                  key: google-clientsecret

          configMaps:
            config:
              enabled: true
              data:
                config.yml: |
                  service:
                    publicurl: "https://tasks.whitediver.keenetic.link/"
                    enableregistration: false
                    customlogourl: "data:image/svg+xml;base64,"
                  auth:
                    local:
                      enabled: false
                    openid:
                      enabled: true
                      redirecturl: "https://tasks.whitediver.keenetic.link/auth/openid/"
                      providers:
                        google:
                          name: "Google"
                          authurl: "https://accounts.google.com"
                          # clientid/clientsecret are NOT set here — they are
                          # injected via env from Secret `vikunja-oidc` (see the
                          # env: block above and README.md). This `google:` key
                          # must remain for the env overrides to bind.
                          scope: "openid profile email"

          ingress:
            main:
              enabled: true
              ingressClassName: nginx
              annotations:
                nginx.ingress.kubernetes.io/proxy-body-size: "0"
              hosts:
                - host: tasks.whitediver.keenetic.link
                  paths:
                    - path: /
                      pathType: Prefix

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: vikunja
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
