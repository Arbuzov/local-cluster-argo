<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="whitediver">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#0ea5b7"/>
      <stop offset="1" stop-color="#0b3a66"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b3a66"/>
      <stop offset="1" stop-color="#072a4d"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="58" fill="url(#ocean)"/>

  <!-- bubbles -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="196" cy="58" r="8"/>
    <circle cx="212" cy="82" r="5"/>
  </g>

  <!-- dive mask -->
  <g>
    <!-- head strap -->
    <rect x="28" y="112" width="200" height="20" rx="10" fill="#ffffff" opacity="0.9"/>
    <!-- mask skirt -->
    <rect x="62" y="92" width="132" height="60" rx="27" fill="#ffffff"/>
    <!-- nose pocket -->
    <path d="M104,150 Q108,184 128,186 Q148,184 152,150 Z" fill="#ffffff"/>
    <!-- lenses -->
    <ellipse cx="98" cy="123" rx="22" ry="18" fill="url(#glass)"/>
    <ellipse cx="158" cy="123" rx="22" ry="18" fill="url(#glass)"/>
    <!-- glints -->
    <path d="M86,114 q10,-6 20,0 q-10,5 -20,0 Z" fill="#ffffff" opacity="0.65"/>
    <path d="M146,114 q10,-6 20,0 q-10,5 -20,0 Z" fill="#ffffff" opacity="0.65"/>
  </g>
</svg>
