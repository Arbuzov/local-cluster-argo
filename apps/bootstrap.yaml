apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argo-cd
spec:
  # The app-of-apps itself lives in the always-present `default` project so it
  # can create the `apps` AppProject below; the child Applications it deploys
  # use `project: apps`.
  project: default
  source:
    repoURL: https://github.com/Arbuzov/local-cluster-argo.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
      # Deploy the AppProject (project.yaml) and every service's
      # Application manifest; exclude this file (bootstrap.yaml) so the
      # app-of-apps never manages itself.
      include: '{project.yaml,*/application*.yaml}'
      # Disabled until they are wanted in this cluster: heimdall and
      # openclaw stay in git but are not deployed.
      exclude: '{heimdall/application.yaml,openclaw/application.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
