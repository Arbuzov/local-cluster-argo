apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argo-cd
  annotations:
    # Create the project before the Applications that reference it
    # (the apps app-of-apps applies both in one sync).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: End-user applications — deployed via the apps app-of-apps (see apps/README.md)
  sourceRepos:
    # The app-of-apps reads the child Application manifests from this repo.
    - https://github.com/Arbuzov/local-cluster-argo.git
    # Helm chart repos the apps Applications pull from.
    - https://unknowniq.github.io/helm-charts/
    - ghcr.io/go-vikunja/helm-chart
    - https://arbuzov.github.io/octoprint
  destinations:
    # Each app deploys into its own namespace.
    - server: https://kubernetes.default.svc
      namespace: homepage
    - server: https://kubernetes.default.svc
      namespace: vikunja
    - server: https://kubernetes.default.svc
      namespace: octoprint
    - server: https://kubernetes.default.svc
      namespace: argo-cd
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
