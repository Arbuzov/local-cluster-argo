apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: End-user applications — deployed via the apps app-of-apps (see apps/README.md)
  sourceRepos:
    - https://github.com/Arbuzov/home-k8s-argo.git
    - https://unknowniq.github.io/helm-charts/
    - ghcr.io/go-vikunja/helm-chart
    - https://arbuzov.github.io/octoprint
  destinations:
    - server: https://kubernetes.default.svc
      namespace: homepage
    - server: https://kubernetes.default.svc
      namespace: vikunja
    - server: https://kubernetes.default.svc
      namespace: octoprint
    - server: https://kubernetes.default.svc
      namespace: argo-cd
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
