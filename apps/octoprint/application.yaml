apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: octoprint
  namespace: argo-cd
  finalizers:  # cascade-delete this app's resources when removed from the app-of-apps; see apps/README.md
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  source:
    repoURL: https://arbuzov.github.io/octoprint
    targetRevision: 0.3.6
    helm:
      values: |
        image:
          # Pinned for reproducible GitOps; bump deliberately. 1.11.7 is the latest
          # stable (the floating `latest` tag lags at 1.11.6).
          tag: 1.11.7
        # Printer is a CP210x USB-serial board on kube-master (appears as /dev/ttyUSB0).
        # hostDev bind-mounts the host's live /dev (devtmpfs) into the pod, so the device is
        # visible even if it (re)appears after the pod starts -> no pod restart on USB replug.
        # `device` is the legacy single-node mount; ignored while hostDev.enabled is true.
        device: /dev/ttyUSB0
        hostDev:
          enabled: true
        ingress:
          enabled: true
          annotations:
            nginx.ingress.kubernetes.io/rewrite-target: /$2
          path: /octoprint(/|$)(.*)
          hostname: 'dev.whitediver.keenetic.link'
          ingressClassName: nginx
          tls: true
          selfSigned: true
          extraHosts:
            - name: ''
              path: /octoprint(/|$)(.*)
        persistence:
          enabled: true
          storageClassName: local-path
        livenessProbe:
          enabled: false
        readinessProbe:
          enabled: false
        startupProbe:
          enabled: false
        nodeSelector:
          kubernetes.io/hostname: kube-master
        config:
          overlay: |-
            server:
              enableCsrfProtection: false
              reverseProxy:
                prefixFallback: /octoprint
                schemeFallback: https
                hostFallback: 192.168.99.44
                useXForwardedHost: true
                useXForwardedPort: true
                trustedProxies:
                  - "10.0.0.0/8"
                  - "192.168.0.0/16"
                  - "172.16.0.0/12"
                  - "::ffff:10.0.0.0/8"
                  - "10.244.0.0/16"
                  - "10.244.2.114"
            serial:
              # Auto-detect and connect to the printer on startup (port/baud left on AUTO
              # so a ttyUSB0<->ttyUSB1 re-enumeration still resolves).
              autoconnect: true
    chart: octoprint
  destination:
    server: https://kubernetes.default.svc
    namespace: octoprint
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
