apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/Arbuzov/home-k8s-argo.git
    targetRevision: main
    path: storage
    directory:
      recurse: true
      include: '*/application*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
