apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: git@github.com:Arbuzov/home-k8s-argo.git
    targetRevision: main
    path: mcp
    directory:
      recurse: true
      include: '{project.yaml,*/application*.yaml}'
      exclude: '{graphiti/application.yaml,homeassistant/application.yaml,kubernetes/application.yaml,gitlab/application.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
