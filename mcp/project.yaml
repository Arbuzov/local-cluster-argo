apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mcp
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: MCP (Model Context Protocol) servers — deployed via the mcp app-of-apps (see mcp/README.md)
  sourceRepos:
    - https://github.com/Arbuzov/home-k8s-argo.git
    - https://arbuzov.github.io/mcp-helm/
    - https://bjw-s-labs.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: mcp
    - server: https://kubernetes.default.svc
      namespace: argo-cd
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
