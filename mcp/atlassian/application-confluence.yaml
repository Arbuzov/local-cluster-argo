apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-atlassian-confluence
  namespace: argo-cd
  finalizers:  # cascade-delete this app's resources when removed from the app-of-apps; see mcp/README.md
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp
  source:
    repoURL: https://arbuzov.github.io/mcp-helm/
    targetRevision: 0.2.28
    chart: mcp-atlassian
    helm:
      values: |
        extraArgs:
          - --transport
          - streamable-http
        # Non-secret env (URLs, flags). API token comes from the
        # mcp-atlassian-confluence-credentials Secret via envSecrets — the
        # chart has no envFrom value for the main container, see README.md.
        # (envFrom inside `sidecars` is fine: sidecars are rendered verbatim.)
        env:
          CONFLUENCE_URL: https://confluence.spacebridge.com
          CONFLUENCE_SSL_VERIFY: 'false'
          MCP_VERY_VERBOSE: true
          MCP_LOGGING_STDOUT: true
          TRANSPORT: streamable-http
        envSecrets:
          CONFLUENCE_USERNAME:
            name: mcp-atlassian-confluence-credentials
            key: CONFLUENCE_USERNAME
          CONFLUENCE_API_TOKEN:
            name: mcp-atlassian-confluence-credentials
            key: CONFLUENCE_API_TOKEN
        livenessProbe:
          enabled: false
        readinessProbe:
          enabled: false
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/auth-type: basic
            nginx.ingress.kubernetes.io/auth-secret: mcp-basic-auth
            nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
            # Same trailing-slash rewrite as the Jira app — remote MCP
            # clients don't follow the server's 307 POST redirect.
            nginx.ingress.kubernetes.io/rewrite-target: /mcp/confluence/$2
          path: /mcp/confluence
          hosts:
            - dev.whitediver.keenetic.link
            - "*"
        sidecars:
          - name: vpn-sidecar
            image: docker.io/aw1cks/openconnect
            env:
              - name: URL
                value: "https://asa.spacebridge.com"
              - name: AUTH_GROUP
                value: VPN_THROUGHT
              - name: EXTRA_ARGS
                value: '--servercert pin-sha256:2xCM3h9AhLPa83cT8SToVrRPm2Ui84bHlW4VaPrE91s='
              # The openconnect image wants USER/PASS; the out-of-band secret
              # stores USERNAME/PASSWORD, so map the keys explicitly.
              - name: USER
                valueFrom:
                  secretKeyRef:
                    name: mcp-atlassian-vpn-credentials
                    key: USERNAME
              - name: PASS
                valueFrom:
                  secretKeyRef:
                    name: mcp-atlassian-vpn-credentials
                    key: PASSWORD
            securityContext:
              privileged: true
              capabilities:
                add:
                  - NET_ADMIN
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
