apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-atlassian-confluence
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp
  source:
    repoURL: https://arbuzov.github.io/mcp-helm/
    targetRevision: 0.2.28
    chart: mcp-atlassian
    helm:
      values: |
        extraArgs:
          - --transport
          - streamable-http
          - --stateless
        image:
          repository: ghcr.io/arbuzov/mcp-atlassian
          tag: 0.21.1-fork.1
        env:
          CONFLUENCE_SSL_VERIFY: 'false'
          MCP_VERY_VERBOSE: true
          MCP_LOGGING_STDOUT: true
          TRANSPORT: streamable-http
        envSecrets:
          CONFLUENCE_URL:
            name: mcp-corp-config
            key: CONFLUENCE_URL
          CONFLUENCE_USERNAME:
            name: mcp-atlassian-confluence-credentials
            key: CONFLUENCE_USERNAME
          CONFLUENCE_API_TOKEN:
            name: mcp-atlassian-confluence-credentials
            key: CONFLUENCE_API_TOKEN
        livenessProbe:
          enabled: false
        readinessProbe:
          enabled: false
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: openconnect-gateway
                topologyKey: kubernetes.io/hostname
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/auth-type: basic
            nginx.ingress.kubernetes.io/auth-secret: mcp-basic-auth
            nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
            nginx.ingress.kubernetes.io/rewrite-target: /mcp/confluence$2
          path: /mcp/confluence
          hosts:
            - dev.whitediver.keenetic.link
            - "*"
        sidecars:
          - name: route-manager
            image: docker.io/aw1cks/openconnect
            command: ["/bin/sh", "-c"]
            env:
              - name: CORP_CIDR
                valueFrom:
                  secretKeyRef:
                    name: mcp-corp-config
                    key: CIDR
            args:
              - |
                SVC=openconnect-gateway.mcp.svc.cluster.local
                CIDR="$CORP_CIDR"
                while true; do
                  GW=$(getent hosts "$SVC" 2>/dev/null | awk '{print $1; exit}')
                  if [ -n "$GW" ]; then
                    CUR=$(ip route show "$CIDR" 2>/dev/null | sed -n 's/.*via \([0-9.]*\).*/\1/p')
                    if [ "$GW" != "$CUR" ]; then
                      ip route replace "$CIDR" via "$GW" && echo "route-manager: $CIDR via $GW"
                    fi
                  fi
                  sleep 15
                done
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
