apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-atlassian-jira
  namespace: argo-cd
  finalizers:  # cascade-delete this app's resources when removed from the app-of-apps; see mcp/README.md
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp
  source:
    repoURL: https://arbuzov.github.io/mcp-helm/
    targetRevision: 0.2.28
    chart: mcp-atlassian
    helm:
      values: |
        extraArgs:
          - --transport
          - streamable-http
        image:
          repository: ghcr.io/arbuzov/mcp-atlassian
          tag: latest
        # Non-secret env only. JIRA_USERNAME / JIRA_API_TOKEN come from
        # the mcp-atlassian-jira-credentials Secret via envSecrets — the
        # chart has no envFrom value, see README.md.
        env:
          JIRA_URL: https://jira.spacebridge.com
          MCP_VERY_VERBOSE: true
          MCP_LOGGING_STDOUT: true
          TRANSPORT: streamable-http
        envSecrets:
          JIRA_USERNAME:
            name: mcp-atlassian-jira-credentials
            key: JIRA_USERNAME
          JIRA_API_TOKEN:
            name: mcp-atlassian-jira-credentials
            key: JIRA_API_TOKEN
        livenessProbe:
          enabled: false
        readinessProbe:
          enabled: false
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/auth-type: basic
            nginx.ingress.kubernetes.io/auth-secret: mcp-basic-auth
            nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
          path: /mcp/jira
          hosts:
            - dev.whitediver.keenetic.link
            - "*"
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
