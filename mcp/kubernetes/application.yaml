apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-kubernetes
  namespace: argo-cd
spec:
  project: mcp
  source:
    repoURL: https://arbuzov.github.io/mcp-helm/
    targetRevision: 0.2.7
    chart: mcp-kubernetes
    helm:
      values: |
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/auth-type: basic
            nginx.ingress.kubernetes.io/auth-secret: mcp-basic-auth
            nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
          path: /mcp/kubernetes
          hosts:
            - dev.whitediver.keenetic.link
            - "*"
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
