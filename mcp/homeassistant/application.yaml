apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-homeassistant
  namespace: argo-cd
  finalizers:  # cascade-delete this app's resources when removed from the app-of-apps; see mcp/README.md
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp
  source:
    repoURL: https://arbuzov.github.io/mcp-helm/
    chart: mcp-homeassistant
    targetRevision: 0.2.4
    helm:
      values: |
        image:
          repository: voska/hass-mcp
          tag: "latest"
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
