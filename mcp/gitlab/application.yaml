apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-gitlab
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp
  source:
    repoURL: https://arbuzov.github.io/mcp-helm/
    targetRevision: 0.3.4
    chart: mcp-gitlab
    helm:
      values: |
        image:
          repository: zereight050/gitlab-mcp
          tag: "2.1.20"
        env:
          STREAMABLE_HTTP: 'true'
          REMOTE_AUTHORIZATION: 'true'
          OAUTH_STATELESS_MODE: 'true'
          HOST: '0.0.0.0'
          PORT: '3003'
          GITLAB_READ_ONLY_MODE: 'false'
          USE_GITLAB_WIKI: 'false'
          USE_MILESTONE: 'false'
          USE_PIPELINE: 'false'
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        envSecrets:
          GITLAB_API_URL:
            secretName: mcp-gitlab-credentials
            secretKey: GITLAB_API_URL
          OAUTH_STATELESS_SECRET:
            secretName: mcp-gitlab-stateless
            secretKey: OAUTH_STATELESS_SECRET
        hostAliases: []
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: openconnect-gateway
                topologyKey: kubernetes.io/hostname
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/auth-type: basic
            nginx.ingress.kubernetes.io/auth-secret: mcp-basic-auth
            nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
            nginx.ingress.kubernetes.io/rewrite-target: /mcp$2
          path: /mcp/gitlab
          hosts:
            - dev.whitediver.keenetic.link
            - "*"
        sidecars:
          - name: route-manager
            image: docker.io/aw1cks/openconnect
            command: ["/bin/sh", "-c"]
            env:
              - name: CORP_CIDR
                valueFrom:
                  secretKeyRef:
                    name: mcp-corp-routing
                    key: CIDR
            args:
              - |
                SVC=openconnect-gateway.mcp.svc.cluster.local
                CIDR="$CORP_CIDR"
                while true; do
                  GW=$(getent hosts "$SVC" 2>/dev/null | awk '{print $1; exit}')
                  if [ -n "$GW" ]; then
                    CUR=$(ip route show "$CIDR" 2>/dev/null | sed -n 's/.*via \([0-9.]*\).*/\1/p')
                    if [ "$GW" != "$CUR" ]; then
                      ip route replace "$CIDR" via "$GW" && echo "route-manager: $CIDR via $GW"
                    fi
                  fi
                  sleep 15
                done
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
          - name: token-injector
            image: nginx:1.27-alpine
            command: ["/bin/sh", "-c"]
            args:
              - |
                printf 'server { listen 3002; location / { proxy_set_header Private-Token "%s"; proxy_pass http://127.0.0.1:3003; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_buffering off; proxy_read_timeout 3600s; } }\n' "$GITLAB_PAT" > /etc/nginx/conf.d/default.conf
                exec nginx -g 'daemon off;'
            env:
              - name: GITLAB_PAT
                valueFrom:
                  secretKeyRef:
                    name: mcp-gitlab-credentials
                    key: GITLAB_PERSONAL_ACCESS_TOKEN
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
