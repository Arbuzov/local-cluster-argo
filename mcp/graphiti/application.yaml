apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: graphiti-mcp
  namespace: argo-cd
  finalizers:  # cascade-delete this app's resources when removed from the app-of-apps; see mcp/README.md
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 3.6.0
    helm:
      values: |
        controllers:
          neo4j:
            type: statefulset
            pod:
              nodeSelector:
                kubernetes.io/hostname: kube-master
              securityContext:
                fsGroup: 7474
                fsGroupChangePolicy: OnRootMismatch
            containers:
              app:
                image:
                  repository: neo4j
                  tag: "5.26.0"
                # NEO4J_AUTH comes from the out-of-band Secret
                # `graphiti-neo4j-auth` (see README.md).
                envFrom:
                  - secretRef:
                      name: graphiti-neo4j-auth
                env:
                  NEO4J_server_memory_heap_initial__size: 256m
                  NEO4J_server_memory_heap_max__size: 512m
                  NEO4J_server_memory_pagecache_size: 256m
                ports:
                  - name: http
                    containerPort: 7474
                  - name: bolt
                    containerPort: 7687
                resources:
                  requests:
                    memory: 512Mi
                    cpu: 100m
                  limits:
                    memory: 1Gi
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /
                        port: 7474
                      initialDelaySeconds: 90
                      periodSeconds: 30
                      timeoutSeconds: 5
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      tcpSocket:
                        port: 7687
                      initialDelaySeconds: 30
                      periodSeconds: 10
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      tcpSocket:
                        port: 7687
                      failureThreshold: 30
                      periodSeconds: 10
            statefulset:
              volumeClaimTemplates:
                - name: data
                  accessMode: ReadWriteOnce
                  size: 5Gi
                  storageClass: local-path
                  globalMounts:
                    - path: /data

          graphiti:
            type: deployment
            pod:
              nodeSelector:
                kubernetes.io/hostname: kube-master
            containers:
              app:
                image:
                  repository: zepai/knowledge-graph-mcp
                  tag: "1.0.2-standalone"
                env:
                  NEO4J_URI: bolt://graphiti-mcp-neo4j:7687
                  NEO4J_DATABASE: neo4j
                  GRAPHITI_GROUP_ID: main
                  SEMAPHORE_LIMIT: "10"
                  MODEL_NAME: gpt-4.1-mini
                  CONFIG_PATH: /app/mcp/config/config-docker-neo4j.yaml
                  GRAPHITI_TELEMETRY_ENABLED: "false"
                # NEO4J_USER / NEO4J_PASSWORD and OPENAI_API_KEY come from
                # the out-of-band Secret `graphiti-mcp-secrets`.
                envFrom:
                  - secretRef:
                      name: graphiti-mcp-secrets
                ports:
                  - name: http
                    containerPort: 8000
                resources:
                  requests:
                    memory: 128Mi
                    cpu: 50m
                  limits:
                    memory: 512Mi
                probes:
                  liveness:
                    enabled: false
                  readiness:
                    enabled: false

        service:
          neo4j:
            controller: neo4j
            ports:
              http:
                port: 7474
              bolt:
                port: 7687
          graphiti:
            controller: graphiti
            ports:
              http:
                port: 8000

        ingress:
          graphiti:
            className: nginx
            annotations:
              nginx.ingress.kubernetes.io/auth-type: basic
              nginx.ingress.kubernetes.io/auth-secret: mcp-basic-auth
              nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
              nginx.ingress.kubernetes.io/use-regex: "true"
              nginx.ingress.kubernetes.io/rewrite-target: /mcp/$2
            hosts:
              - host: dev.whitediver.keenetic.link
                paths:
                  - path: /mcp/graphiti(/|$)(.*)
                    pathType: ImplementationSpecific
                    service:
                      identifier: graphiti
                      port: http

  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
