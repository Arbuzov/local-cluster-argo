apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: media
  namespace: argo-cd
spec:
  # App-of-apps for the media group. Stays in the always-present `default`
  # project so it can create the `media` AppProject (project.yaml, sync-wave
  # -1); the child Applications all carry `project: media`.
  project: default
  source:
    repoURL: https://github.com/Arbuzov/local-cluster-argo.git
    targetRevision: main
    path: media
    directory:
      recurse: true
      # project.yaml (the AppProject) + every service's Application manifest.
      # bootstrap.yaml sits at the media/ root, so `*/application*.yaml` never
      # matches it — the app-of-apps doesn't manage itself.
      include: '{project.yaml,*/application*.yaml}'
      # Kept in git but held back from this cluster. Disabling here (rather than
      # replicas:0) is the on/off switch — children carry the Argo cascade
      # finalizer, and all their data PVs are Retain, so a prune deletes the
      # workload but never the data. Editing this list requires re-applying the
      # app-of-apps (it never manages itself) — see media/README.md.
      exclude: '{jellyfin/application.yaml,pigallery2/application.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
