apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: media
  namespace: argo-cd
spec:
  description: Media services (photoprism, jellyfin, pigallery2, opds-shelf) — deployed via the media app-of-apps (see media/README.md)
  sourceRepos:
    - https://github.com/Arbuzov/home-k8s-argo.git
    - https://andrenarchy.github.io/helm-charts
    - https://jellyfin.github.io/jellyfin-helm
    - https://bjw-s-labs.github.io/helm-charts
    - https://arbuzov.github.io/opds-shelf/
  destinations:
    - server: https://kubernetes.default.svc
      namespace: photoprism
    - server: https://kubernetes.default.svc
      namespace: jellyfin
    - server: https://kubernetes.default.svc
      namespace: pigallery2
    - server: https://kubernetes.default.svc
      namespace: opds-shelf
    - server: https://kubernetes.default.svc
      namespace: argo-cd
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
