apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: media
  namespace: argo-cd
  annotations:
    # Create the project before the Applications that reference it
    # (the media app-of-apps applies both in one sync).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: Media services (photoprism, jellyfin, pigallery2, opds-shelf) — deployed via the media app-of-apps (see media/README.md)
  sourceRepos:
    # The app-of-apps reads the child Application manifests from this repo.
    - https://github.com/Arbuzov/local-cluster-argo.git
    # Helm chart repos the media Applications pull from.
    - https://andrenarchy.github.io/helm-charts
    - https://jellyfin.github.io/jellyfin-helm
    - https://bjw-s-labs.github.io/helm-charts
    - https://arbuzov.github.io/opds-shelf/
  destinations:
    # Each app deploys into its own namespace.
    - server: https://kubernetes.default.svc
      namespace: photoprism
    - server: https://kubernetes.default.svc
      namespace: jellyfin
    - server: https://kubernetes.default.svc
      namespace: pigallery2
    - server: https://kubernetes.default.svc
      namespace: opds-shelf
    - server: https://kubernetes.default.svc
      namespace: argo-cd
  clusterResourceWhitelist:
    # photoprism + pigallery2 create cluster-scoped PersistentVolumes.
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
