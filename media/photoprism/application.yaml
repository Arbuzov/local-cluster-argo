apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: photoprism
  namespace: argo-cd
spec:
  project: media
  source:
    repoURL: https://andrenarchy.github.io/helm-charts
    chart: photoprism
    targetRevision: ">=0.0.0"
    helm:
      values: |
        image:
          repository: photoprism/photoprism
          tag: "latest"
        env:
          PHOTOPRISM_SITE_URL: "https://photos.whitediver.keenetic.link/"
          PHOTOPRISM_WORKERS: "1"               # single-threaded indexing — bounds RAM/CPU on this small cluster
          PHOTOPRISM_DISABLE_TENSORFLOW: "true" # no TF classification/faces — TF is the big RAM consumer
          PHOTOPRISM_DEBUG: "false"
          PHOTOPRISM_READONLY: "true"
          PHOTOPRISM_PUBLIC: "false"        # OIDC requires non-public mode (public mode disables auth)
          PHOTOPRISM_DEFAULT_TLS: "false"
          PHOTOPRISM_LOG_LEVEL: "debug"
          # Absolute path so the sqlite DB lands on the persistent storage
          # volume, not the server's ephemeral CWD (/run, tmpfs). On SMB use a
          # rollback journal (TRUNCATE) — WAL needs an mmap'd -shm file that
          # CIFS can't provide; the smb mount uses nobrl + single writer.
          PHOTOPRISM_DATABASE_DSN: "/photoprism/storage/index.db?_busy_timeout=30000&_journal=TRUNCATE&_txlock=immediate&_fk=1"
          PHOTOPRISM_DATABASE_CONNS: 1
          PHOTOPRISM_DATABASE_CONNS_IDLE: 0
          PHOTOPRISM_DISABLE_CHOWN: "true"
          UID: "999"
          # Google OIDC via the cluster's shared Google OAuth client (same one
          # argo-cd/vikunja use). Client id/secret + a generated admin password
          # are injected from Secret `photoprism-oidc` (created out-of-band, see
          # README.md). The shared Google client MUST list this redirect URI:
          #   https://photos.whitediver.keenetic.link/api/v1/oidc/redirect
          # Allowlist is inherited from that client's Google consent screen.
          PHOTOPRISM_OIDC_URI: "https://accounts.google.com"
          PHOTOPRISM_OIDC_PROVIDER: "Google"
          PHOTOPRISM_OIDC_REGISTER: "true"
          PHOTOPRISM_OIDC_CLIENT:
            valueFrom:
              secretKeyRef:
                name: photoprism-oidc
                key: client-id
          PHOTOPRISM_OIDC_SECRET:
            valueFrom:
              secretKeyRef:
                name: photoprism-oidc
                key: client-secret
          PHOTOPRISM_ADMIN_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: photoprism-oidc
                key: admin-password
        securityContext:
          runAsUser: 999
          runAsGroup: 999
        # Pinned to kube-worker-3 (Pi 5, 8Gi RAM). Memory is bounded so a heavy
        # index run can never take the node down again: the pod is OOM-killed at
        # the limit instead of the kubelet hanging (what knocked out worker-1).
        nodeSelector:
          kubernetes.io/hostname: kube-worker-3
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 3Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 2342
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 50
              failureThreshold: 120
          liveness:
            enabled: false
            custom: true
            spec:
              tcpSocket:
                port: 2342
              periodSeconds: 10
              timeoutSeconds: 30
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 2342
              periodSeconds: 10
              timeoutSeconds: 30
              failureThreshold: 3
        persistence:
          config:
            enabled: true
            accessMode: ReadWriteMany
            size: 20Gi
            storageClass: smb
            mountPath: /photoprism/storage
          # Originals = the cluster's current media folder: the `pictures`
          # SMB share //192.168.99.44/pictures (same share pigallery2 and
          # jellyfin read). Statically bound to the photoprism-pictures PV
          # at the end of this file; mounted read-only so PhotoPrism never
          # mutates the shared library (its index/thumbnails live in the
          # `config` storage volume, and PHOTOPRISM_READONLY is "true").
          originals:
            enabled: true
            accessMode: ReadWriteMany
            size: 200Gi
            storageClass: "-"          # "-" -> storageClassName "" (static bind, no dynamic provisioning)
            volumeName: photoprism-pictures
            mountPath: /photoprism/originals
            readOnly: true
        ingress:
          main:
            enabled: true
            ingressClassName: nginx
            annotations:
              # Keenetic router terminates TLS and forwards HTTP to nginx, so
              # nginx's default HTTP->HTTPS redirect loops forever. Disable it,
              # same as pigallery2/jellyfin on this cluster.
              nginx.ingress.kubernetes.io/ssl-redirect: "false"
              nginx.ingress.kubernetes.io/proxy-body-size: "100m"
              # No basic-auth: PhotoPrism handles login itself (Google OIDC +
              # admin password, PHOTOPRISM_PUBLIC=false). The OIDC callback
              # /api/v1/oidc/redirect must be reachable without an outer auth
              # layer, so the nginx basic-auth annotations are removed.
            hosts:
              - host: photos.whitediver.keenetic.link
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: chart-photoprism-tls
                hosts:
                  - photos.whitediver.keenetic.link
  destination:
    server: https://kubernetes.default.svc
    namespace: photoprism
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# Static SMB-CSI volume for the cluster's current photo media folder.
# Mirrors media/pigallery2 (same //192.168.99.44/pictures share). Bound to
# the chart-created PVC photoprism-originals (namespace photoprism) via the
# claimRef below + that PVC's volumeName. uid/gid 999 match PhotoPrism's user.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: photoprism-pictures
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: photoprism
    name: photoprism-originals
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: photoprism-pictures
    nodeStageSecretRef:
      name: smbcreds
      namespace: smb
    volumeAttributes:
      source: "//192.168.99.44/pictures"
  mountOptions:
    - dir_mode=0755
    - file_mode=0644
    - uid=999
    - gid=999
    - vers=3.1.1
    - serverino
    - nobrl
