apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ai
  namespace: argo-cd
  annotations:
    # Create the project before the Applications that reference it
    # (the ai app-of-apps applies both in one sync).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: AI / automation apps — deployed via the ai app-of-apps (see ai/README.md)
  sourceRepos:
    # The app-of-apps reads the child Application manifests from this repo.
    - https://github.com/Arbuzov/local-cluster-argo.git
    # OCI Helm registry the n8n Application pulls its chart from.
    - 8gears.container-registry.com/library
  destinations:
    - server: https://kubernetes.default.svc
      namespace: n8n
    - server: https://kubernetes.default.svc
      namespace: argo-cd
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
