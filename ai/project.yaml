apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ai
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: AI / automation apps — deployed via the ai app-of-apps (see ai/README.md)
  sourceRepos:
    - https://github.com/Arbuzov/home-k8s-argo.git
    - 8gears.container-registry.com/library
    - ghcr.io/berriai
  destinations:
    - server: https://kubernetes.default.svc
      namespace: n8n
    - server: https://kubernetes.default.svc
      namespace: litellm
    - server: https://kubernetes.default.svc
      namespace: argo-cd
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
