apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argo-cd
spec:
  project: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  source:
    repoURL: 8gears.container-registry.com/library
    targetRevision: 2.0.1
    helm:
      # Sensitive values (N8N_ENCRYPTION_KEY, Postgres password) are read
      # from the pre-existing Secret `n8n-secrets` in the `n8n` namespace.
      # See README.md for the keys and a sample `kubectl create secret`.
      # NB: do NOT add `valuesObject` here — an empty one wins over `values`
      # and the chart silently renders defaults (no worker/webhook/db).
      values: |
        image:
          repository: n8nio/n8n
          tag: 2.18.4
        db:
          type: postgresdb
          logging:
            enabled: true
            options: error
            maxQueryExecutionTime: 1000
        worker:
          enabled: true
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "800m"
          extraEnv: &extraEnv
            N8N_RUNNERS_ENABLED:
              value: "true"
            N8N_USER_FOLDER:
              value: /home/node
            N8N_PORT:
              value: '5678'
            N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:
              value: "true"
            N8N_ENCRYPTION_KEY:
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_ENCRYPTION_KEY
            # worker/webhook need the DB password too (main has its own copy);
            # without it they crash: "SASL: ... client password must be a string".
            DB_POSTGRESDB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: postgres-n8n
                  key: POSTGRES_PASSWORD
            WEBHOOK_URL:
              value: https://n8n.whitediver.keenetic.link/
          livenessProbe: null
          readinessProbe: null
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
        webhook:
          config:
            executions_mode: queue
            queue:
              health:
                check:
                  active: true
              bull:
                redis:
                  host: n8n-redis
                  port: 6379
          enabled: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          extraEnv: *extraEnv
          livenessProbe: null
          readinessProbe: null
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
        main:
          resources:
            requests:
              memory: "512Mi"
              cpu: "700m"
            limits:
              memory: "2Gi"
              cpu: "2"
          config:
            db:
              type: postgresdb
              postgresdb:
                host: postgres-n8n
                port: 5432
                database: n8n
                user: n8n
                # password injected via DB_POSTGRESDB_PASSWORD env (see extraEnv below)
            queue:
              health:
                check:
                  active: true
              bull:
                redis:
                  host: n8n-redis
                  port: 6379
          extraEnv:
            N8N_USER_FOLDER:
              value: /home/node
            N8N_EDITOR_BASE_URL:
              value: https://n8n.whitediver.keenetic.link/
            VUE_APP_URL_BASE_API:
              value: https://n8n.whitediver.keenetic.link/
            WEBHOOK_URL:
              value: https://n8n.whitediver.keenetic.link/
            N8N_HOST:
              value: n8n.whitediver.keenetic.link
            N8N_ENCRYPTION_KEY:
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_ENCRYPTION_KEY
            DB_POSTGRESDB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: postgres-n8n
                  key: POSTGRES_PASSWORD
            N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:
              value: "true"
            N8N_PORT:
              value: '5678'
            N8N_PROXY_HOPS:
              value: '3'
            N8N_RUNNERS_ENABLED:
              value: "true"
            N8N_PROTOCOL:
              value: https
            N8N_SKIP_WEBHOOK_ORIGIN_CHECK:
              value: "true"
            N8N_DISABLE_PRODUCTION_MAIN_PROCESS:
              value: "true"
            NODE_ENV:
              value: development
          persistence:
            enabled: false
            storageClass: "smb"
            type: dynamic
          livenessProbe: null
          readinessProbe: null
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          podSecurityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
          extraVolumeMounts:
                - mountPath: /home/node/.cache
                  name: n8n-cache
          extraVolumes:
            - name: n8n-cache
              emptyDir: {}
        extraManifests:
          # Redis Deployment
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: redis-n8n
              namespace: n8n
              labels:
                app: redis-n8n
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: redis-n8n
              template:
                metadata:
                  labels:
                    app: redis-n8n
                spec:
                  containers:
                    - name: redis
                      image: redis:7
                      imagePullPolicy: IfNotPresent
                      ports:
                        - containerPort: 6379
                          name: redis
                      resources:
                        requests:
                          memory: "64Mi"
                          cpu: "50m"
                        limits:
                          memory: "128Mi"
                          cpu: "200m"
          # Redis Service
          - apiVersion: v1
            kind: Service
            metadata:
              name: n8n-redis
              namespace: n8n
            spec:
              selector:
                app: redis-n8n
              ports:
                - name: redis
                  port: 6379
                  targetPort: 6379
          # StorageClass for Postgres on the smb-csi share. The smb share is NOT
          # POSIX (raw mode is forced 0777, chmod is a no-op), so Postgres can't
          # run PGDATA on it via hostPath. CIFS mount options translate ownership
          # and mode for the client: uid/gid=999 + dir_mode=0700/file_mode=0600
          # make Postgres see a 0700 dir it owns. subDir is deterministic
          # (pvc-<ns>-<pvc> = pvc-n8n-postgres-n8n-pg), so the data survives a
          # PVC delete/recreate. See README.
          - apiVersion: storage.k8s.io/v1
            kind: StorageClass
            metadata:
              name: smb-pg
            provisioner: smb.csi.k8s.io
            parameters:
              csi.storage.k8s.io/node-stage-secret-name: smbcreds
              csi.storage.k8s.io/node-stage-secret-namespace: smb
              csi.storage.k8s.io/provisioner-secret-name: smbcreds
              csi.storage.k8s.io/provisioner-secret-namespace: smb
              source: //192.168.99.44/smb-csi
              subDir: "pvc-${pvc.metadata.namespace}-${pvc.metadata.name}"
            mountOptions:
              - vers=3.1.1
              - serverino
              - actimeo=1
              - cache=none
              - uid=999
              - gid=999
              - dir_mode=0700
              - file_mode=0600
            allowVolumeExpansion: true
            reclaimPolicy: Retain
            volumeBindingMode: Immediate
          # PVC for Postgres data (binds to subDir pvc-n8n-postgres-n8n-pg)
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: postgres-n8n-pg
              namespace: n8n
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi
              storageClassName: smb-pg
          # PostgreSQL Deployment (consumes Secret postgres-n8n created out-of-band).
          # Pinned to kube-master (co-located with the smb server) and Recreate so
          # two postmasters never share one PGDATA.
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: postgres-n8n
              namespace: n8n
              labels:
                app: postgres-n8n
            spec:
              replicas: 1
              strategy:
                type: Recreate
              selector:
                matchLabels:
                  app: postgres-n8n
              template:
                metadata:
                  labels:
                    app: postgres-n8n
                spec:
                  nodeSelector:
                    kubernetes.io/hostname: kube-master
                  securityContext:
                    # uid/gid 999 matches the smb-pg mount options (uid=999), which
                    # present the share to Postgres as 999:999 / 0700.
                    fsGroup: 999
                  containers:
                    - name: postgres
                      image: postgres:15
                      imagePullPolicy: IfNotPresent
                      args:
                        - -c
                        - synchronous_commit=off
                      env:
                        - name: POSTGRES_DB
                          valueFrom:
                            secretKeyRef:
                              name: postgres-n8n
                              key: POSTGRES_DB
                        - name: POSTGRES_USER
                          valueFrom:
                            secretKeyRef:
                              name: postgres-n8n
                              key: POSTGRES_USER
                        - name: POSTGRES_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: postgres-n8n
                              key: POSTGRES_PASSWORD
                        - name: PGDATA
                          value: /var/lib/postgresql/data/pgdata
                      securityContext:
                        runAsUser: 999
                        runAsGroup: 999
                      ports:
                        - containerPort: 5432
                          name: tcp
                      volumeMounts:
                        - name: data
                          mountPath: /var/lib/postgresql/data
                      resources:
                        requests:
                          memory: "128Mi"
                          cpu: "100m"
                        limits:
                          memory: "256Mi"
                          cpu: "500m"
                  volumes:
                    - name: data
                      persistentVolumeClaim:
                        claimName: postgres-n8n-pg
          # Service for PostgreSQL
          - apiVersion: v1
            kind: Service
            metadata:
              name: postgres-n8n
              namespace: n8n
            spec:
              selector:
                app: postgres-n8n
              ports:
                - name: tcp
                  port: 5432
                  targetPort: 5432
          # PVC for backups — on the dynamic `smb` class (uid=999), so the job
          # runs as 999 to be able to write. See README for restore steps.
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: n8n-backup
              namespace: n8n
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
              storageClassName: smb
          # Nightly export of all workflows + credentials (credentials stay
          # ENCRYPTED — restorable only with the same N8N_ENCRYPTION_KEY) to the
          # backup PVC, 14-day retention. Reads the DB directly (read-only), so
          # it's safe to run alongside the live tiers.
          - apiVersion: batch/v1
            kind: CronJob
            metadata:
              name: n8n-backup
              namespace: n8n
            spec:
              schedule: "0 3 * * *"
              concurrencyPolicy: Forbid
              successfulJobsHistoryLimit: 3
              failedJobsHistoryLimit: 3
              jobTemplate:
                spec:
                  backoffLimit: 1
                  template:
                    spec:
                      restartPolicy: Never
                      # n8n's own N8N_PORT config clashes with the legacy
                      # service-link env k8s would inject (Service `n8n`).
                      enableServiceLinks: false
                      securityContext:
                        runAsUser: 999
                        runAsGroup: 999
                        fsGroup: 999
                      containers:
                        - name: export
                          image: n8nio/n8n:2.18.4
                          imagePullPolicy: IfNotPresent
                          env:
                            - name: N8N_USER_FOLDER
                              value: /tmp
                            - name: DB_TYPE
                              value: postgresdb
                            - name: DB_POSTGRESDB_HOST
                              value: postgres-n8n
                            - name: DB_POSTGRESDB_PORT
                              value: "5432"
                            - name: DB_POSTGRESDB_DATABASE
                              value: n8n
                            - name: DB_POSTGRESDB_USER
                              value: n8n
                            - name: DB_POSTGRESDB_PASSWORD
                              valueFrom:
                                secretKeyRef:
                                  name: postgres-n8n
                                  key: POSTGRES_PASSWORD
                            - name: N8N_ENCRYPTION_KEY
                              valueFrom:
                                secretKeyRef:
                                  name: n8n-secrets
                                  key: N8N_ENCRYPTION_KEY
                          command:
                            - sh
                            - -c
                            - |
                              set -e
                              ts=$(date +%F)
                              n8n export:workflow --all --output=/backup/workflows-$ts.json
                              n8n export:credentials --all --output=/backup/credentials-$ts.json
                              find /backup -name 'workflows-*.json' -mtime +14 -delete
                              find /backup -name 'credentials-*.json' -mtime +14 -delete
                              ls -la /backup
                          volumeMounts:
                            - name: backup
                              mountPath: /backup
                      volumes:
                        - name: backup
                          persistentVolumeClaim:
                            claimName: n8n-backup
        ingress:
          enabled: true
          className: "nginx"
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "100m"
            nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-buffering: "off"
            nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
            nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
            nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "600"
          hosts:
            - host: n8n.whitediver.keenetic.link
              paths:
                - path: /
                  pathType: Prefix
    chart: n8n
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
