apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/Arbuzov/home-k8s-argo.git
    targetRevision: main
    path: observability
    directory:
      recurse: true
      include: '{project.yaml,*/application*.yaml}'
      exclude: '{influxdb/application.yaml,prometheus/application.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
